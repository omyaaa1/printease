{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <h1>Upload Print Order</h1>
    <p class="muted">Multiple files supported. PDF page counts are computed after upload.</p>
  </div>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form id="printForm" action="/upload" method="post" enctype="multipart/form-data">
    <div class="grid-2">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div>
        <label for="phone">Phone (10 digits)</label>
        <input type="tel" id="phone" name="phone" pattern="\d{10}" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div>
        <label for="hostel">Hostel Resident?</label>
        <select id="hostel" name="hostel" onchange="toggleDelivery()">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
      <div id="deliveryDiv" class="hidden">
        <label for="delivery">Deliver to Room?</label>
        <select id="delivery" name="delivery">
          <option value="no">No</option>
          <option value="yes">Yes (+INR 10)</option>
        </select>
      </div>
      <div id="roomDiv" class="hidden">
        <label for="room_no">Room No</label>
        <input type="text" id="room_no" name="room_no" />
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <label for="fileUpload">Select Files</label>
      <input type="file" id="fileUpload" name="file" multiple required />
    </div>

    <div id="fileList" class="file-list"></div>

    <div class="grid-2">
      <div>
        <label for="print_type">Print Type</label>
        <select id="print_type" name="print_type">
          <option value="bw">Black &amp; White</option>
          <option value="color">Color</option>
        </select>
      </div>
      <div>
        <label for="sideOption">Sides</label>
        <select id="sideOption" name="side">
          <option value="single">Single Side</option>
          <option value="double">Double Side</option>
        </select>
      </div>
      <div>
        <label for="lamination">Lamination</label>
        <select id="lamination" name="lamination">
          <option value="no">No</option>
          <option value="yes">Yes (+INR 25)</option>
        </select>
      </div>
    </div>

    <div class="price-row">
      <div class="price-box">
        <div class="muted">Estimate</div>
        <div id="priceDisplay" class="price">INR 0</div>
      </div>
      <button type="button" class="btn secondary" onclick="updateEstimate()">Update Estimate</button>
      <button type="submit" class="btn">Submit Order</button>
    </div>
  </form>
</section>

<script>
  function toggleDelivery() {
    const hostel = document.getElementById('hostel').value;
    const deliveryDiv = document.getElementById('deliveryDiv');
    const roomDiv = document.getElementById('roomDiv');
    const showDelivery = hostel === 'yes';
    deliveryDiv.classList.toggle('hidden', !showDelivery);
    if (!showDelivery) {
      document.getElementById('delivery').value = 'no';
      document.getElementById('room_no').value = '';
    }
    toggleRoom();
  }

  function toggleRoom() {
    const delivery = document.getElementById('delivery').value;
    const roomDiv = document.getElementById('roomDiv');
    const roomInput = document.getElementById('room_no');
    const showRoom = delivery === 'yes';
    roomDiv.classList.toggle('hidden', !showRoom);
    roomInput.required = showRoom;
  }

  const fileUpload = document.getElementById('fileUpload');
  const fileList = document.getElementById('fileList');

  function renderFileRows(files) {
    fileList.innerHTML = '';
    Array.from(files).forEach((file, idx) => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.dataset.pdf = file.name.toLowerCase().endsWith('.pdf') ? '1' : '0';
      row.innerHTML = `
        <div class="file-name">${file.name}${row.dataset.pdf === '1' ? ' (PDF pages auto-counted)' : ''}</div>
        <label>Copies
          <input type="number" name="copies" min="1" value="1" data-index="${idx}" />
        </label>
        <label>Pages
          <input type="number" name="pages" min="1" value="1" data-index="${idx}" />
        </label>
      `;
      fileList.appendChild(row);
    });
  }

  function updateEstimate() {
    const type = document.getElementById('print_type').value;
    const side = document.getElementById('sideOption').value;
    const lamination = document.getElementById('lamination').value;
    const hostel = document.getElementById('hostel').value;
    const delivery = hostel === 'yes' ? document.getElementById('delivery').value : 'no';

    let rate = 0;
    if (type === 'bw') {
      rate = side === 'single' ? 3 : 5;
    } else {
      rate = 20;
    }

    let total = 0;
    const rows = fileList.querySelectorAll('.file-row');
    rows.forEach((row) => {
      const copies = parseInt(row.querySelector('input[name="copies"]').value || '1', 10);
      const pages = parseInt(row.querySelector('input[name="pages"]').value || '1', 10);
      total += rate * copies * pages;
    });

    if (lamination === 'yes') {
      total += 25;
    }
    if (delivery === 'yes') {
      total += 10;
    }

    document.getElementById('priceDisplay').textContent = `INR ${total}`;
  }

  fileUpload.addEventListener('change', () => {
    renderFileRows(fileUpload.files);
    updateEstimate();
  });

  fileList.addEventListener('input', updateEstimate);
  document.getElementById('print_type').addEventListener('change', updateEstimate);
  document.getElementById('sideOption').addEventListener('change', updateEstimate);
  document.getElementById('lamination').addEventListener('change', updateEstimate);
  document.getElementById('delivery').addEventListener('change', () => {
    toggleRoom();
    updateEstimate();
  });

  toggleDelivery();
</script>
{% endblock %}
